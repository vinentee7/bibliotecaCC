<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Bibliotecário</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="nav-brand">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            Painel do Bibliotecário
        </div>
        <div class="usuario-info">
            <span id="nome-usuario"></span>
            <button class="btn-sair" onclick="sair()">Sair</button>
        </div>
    </header>

    <main>
        <p id="mensagem" class="mensagem"></p>

        <section class="card">
            <h2 id="titulo-form">Cadastrar novo livro</h2>
            <form id="form-livro">
                <input type="hidden" id="livro-id">
                <div class="form-linha">
                    <label>Título
                        <input type="text" id="livro-titulo" required>
                    </label>
                    <label>Autor
                        <input type="text" id="livro-autor" required>
                    </label>
                </div>
                <div class="form-linha">
                    <label>Ano de publicação
                        <input type="number" id="livro-ano" min="0">
                    </label>
                    <label>Quantidade disponível
                        <input type="number" id="livro-quantidade" min="0" required>
                    </label>
                </div>
                <label>
                    URL da capa
                    <input type="text" id="livro-capa" placeholder="https://site.com/capa.jpg">
                </label>
                <img id="preview-capa" src="" style="
        width:120px;
        margin-top:10px;
        border-radius:8px;
        display:none;
    ">
                <button type="submit">Salvar livro</button>
                <button type="button" id="btn-cancelar" class="escondido" onclick="cancelarEdicao()">Cancelar</button>
            </form>
        </section>

        <section class="card">
            <h2>Acervo de livros</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Ano</th>
                        <th>Qtd. disponível</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-livros"></tbody>
            </table>
        </section>

        <section class="card">
            <h2>Empréstimos</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Leitor</th>
                        <th>Livro</th>
                        <th>Empréstimo</th>
                        <th>Prev. devolução</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-emprestimos"></tbody>
            </table>
        </section>
    </main>

    <script src="bibliotecario.js"></script>
</body>
</html>
